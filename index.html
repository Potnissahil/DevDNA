<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="DevDNA is a production-ready SaaS workspace for developer growth analytics, GitHub insights, learning plans, and architecture reviews."
    />
    <title>DevDNA | Developer Growth Intelligence</title>
    <script>
      (function () {
        var key = "devdna-theme";
        var stored = localStorage.getItem(key);
        var theme =
          stored === "light" || stored === "dark"
            ? stored
            : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
        document.documentElement.dataset.theme = theme;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
